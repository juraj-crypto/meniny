<div id="meniny-box" style="font-family: 'Segoe UI', Arial; background: rgba(0, 0, 0, 0.7); border-left: 5px solid #ff9800; padding: 20px; color: #ffffff; border-radius: 0 15px 15px 0; box-shadow: 2px 2px 10px rgba(0,0,0,0.3);">
  
  <div style="font-size: 18px; font-weight: normal; margin-bottom: 2px;">Dnes má meniny:</div>
  <div id="meno-dnes" style="font-size: 36px; font-weight: bold; color: #ff9800; margin-bottom: 15px;">Načítavam...</div>
  
  <div style="font-size: 15px; font-weight: normal; margin-bottom: 2px;">Zajtra má meniny:</div>
  <div id="meno-zajtra" style="font-size: 24px; font-weight: bold; color: #4fc3f7;">Načítavam...</div>

</div>

<script>
async function getMeniny() {
  try {
    const response = await fetch('https://raw.githubusercontent.com/zoltancsontos/slovak-name-days-json/master/slovak-nameday-list.json');
    const data = await response.json();
    
    // Zistíme dátum pre DNES
    const dnes = new Date();
    // OPRAVA: Odstránené +1, keďže databáza čísluje mesiace od 0 (0=Január)
    const mesiacDnes = dnes.getMonth().toString(); 
    const denDnes = dnes.getDate().toString();
    
    // Zistíme dátum pre ZAJTRA
    const zajtra = new Date();
    zajtra.setDate(dnes.getDate() + 1);
    // OPRAVA: Aj pre zajtrajšok ťaháme správny index mesiaca
    const mesiacZajtra = zajtra.getMonth().toString();
    const denZajtra = zajtra.getDate().toString();
    
    // Vytiahneme konkrétne mená zo súboru
    const menoDnes = data[mesiacDnes][denDnes];
    const menoZajtra = data[mesiacZajtra][denZajtra];
    
    // Zápis do HTML pre DNES
    if (menoDnes) {
      document.getElementById('meno-dnes').innerHTML = menoDnes;
    } else {
      document.getElementById('meno-dnes').innerHTML = "Sviatok / Voľný deň";
    }

    // Zápis do HTML pre ZAJTRA
    if (menoZajtra) {
      document.getElementById('meno-zajtra').innerHTML = menoZajtra;
    } else {
      document.getElementById('meno-zajtra').innerHTML = "Sviatok / Voľný deň";
    }

  } catch (error) {
    document.getElementById('meno-dnes').innerHTML = "Chyba načítania";
    document.getElementById('meno-zajtra').innerHTML = "Chyba načítania";
  }
}

getMeniny();
setInterval(getMeniny, 3600000);
</script>
